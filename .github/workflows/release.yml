name: Release Build

on:
  workflow_dispatch:
  # Can be triggered manually from the Actions tab for ad-hoc releases or testing.
  #
  # Also auto-fire whenever VERSION.txt changes — bumping the version is the
  # canonical "cut a release" signal, so the artifact gets built without
  # needing a manual workflow_dispatch.
  push:
    paths:
      - 'VERSION.txt'

jobs:
  build:
    runs-on: windows-2025-vs2026
    # Enable vcpkg binary caching. vcpkg keys each package by an ABI hash
    # (port + triplet + compiler + deps), so unchanged dependencies restore in
    # seconds on later runs instead of rebuilding from source. The "files,"
    # provider writes packages to a local directory; we wrap that directory
    # with actions/cache below so it persists across runs.
    # ("clear" drops the default sources; ",readwrite" both restores and uploads.)
    # Orthogonal to the baseline strip below — this caches build output only and
    # never fetches the registry baseline.
    # (Previously used "x-gha", which was removed when GitHub retired the v1
    # Actions Cache Service.)
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
    # Matrix on configuration only — both Win32 and x64 are built sequentially
    # within each leg via doubled msbuild calls. Debug and Release legs are
    # smoke-tests; Final Release is the shipped config and the only one that
    # produces an artifact.
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release, "Final Release"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore vcpkg binary cache
        # Cache the directory vcpkg writes its binary packages to (see the
        # VCPKG_BINARY_SOURCES env on the job). Single key now that both
        # Win32 and x64 build within one job: static triplets package debug
        # and release libs together, so all configurations share the same
        # archives. Cache invalidates when vcpkg.json changes; the
        # restore-keys prefix gives partial hits otherwise.
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-

      - name: Strip builtin-baseline from vcpkg.json
        # Local builds (VS2026-bundled vcpkg) require a baseline for manifest
        # mode. The runner's standalone vcpkg cannot. Keep the baseline in
        # vcpkg.json for local dev and strip it here.
        # The change is to the runner's ephemeral checkout only; never committed.
        run: (Get-Content vcpkg.json) | Where-Object { $_ -notmatch '"builtin-baseline"' } | Set-Content vcpkg.json

      - name: Integrate vcpkg with MSBuild
        # temporary build setup, will be revised.
        run: vcpkg integrate install

      - name: Generate version header
        # Writes bin/temp_version.h from VERSION.txt + git SHA before any build.
        run: .\bin\generate_version.ps1

      - name: Build S3DDriver.sln (Win32)
        run: msbuild S3DDriver.sln /p:Configuration="${{ matrix.configuration }}" /p:Platform=Win32 /m /nologo /verbosity:minimal

      - name: Build S3DDriver.sln (x64)
        run: msbuild S3DDriver.sln /p:Configuration="${{ matrix.configuration }}" /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Read version from VERSION.txt
        # Mirrors the parse rule in bin/generate_version.ps1: strip any
        # "-suffix" (e.g. "0.2.4-rc1" -> "0.2.4") so the artifact name stays
        # in lockstep with the version baked into the DLLs.
        if: matrix.configuration == 'Final Release'
        id: version
        shell: pwsh
        run: |
          $raw = (Get-Content -Raw VERSION.txt).Trim()
          $numeric = ($raw -split '-', 2)[0]
          "version=$numeric" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "wiz3D version: $numeric"

      - name: Build wiz3D-proxy.sln (Release, Win32)
        # Proxy solution only defines Debug/Release (no Final Release config).
        # Only built on the Final Release leg since that's the only leg that
        # assembles an artifact — Debug isn't interesting here.
        if: matrix.configuration == 'Final Release'
        run: msbuild wiz3D-proxy\wiz3D-proxy.sln /p:Configuration=Release /p:Platform=Win32 /m /nologo /verbosity:minimal

      - name: Build wiz3D-proxy.sln (Release, x64)
        if: matrix.configuration == 'Final Release'
        run: msbuild wiz3D-proxy\wiz3D-proxy.sln /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Stage releases tree
        # deploy_to_releases.ps1 with no -Arch defaults to 'both' and pairs
        # S3DDriver's Final Release output with the proxy's Release output for
        # both Win32 and x64 in one pass.
        if: matrix.configuration == 'Final Release'
        run: .\bin\deploy_to_releases.ps1

      - name: Upload combined release artifact
        # Single artifact, name pulled from VERSION.txt (e.g. wiz3D.v0.2.4).
        if: matrix.configuration == 'Final Release'
        uses: actions/upload-artifact@v6
        with:
          name: wiz3D.v${{ steps.version.outputs.version }}
          path: releases/
          if-no-files-found: error
